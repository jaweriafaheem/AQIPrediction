name: AQI Model Training Pipeline

on:
  schedule:
    # Run weekly on Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allows manual trigger

jobs:
  train-model:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run training pipeline
        env:
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
        run: |
          # Use headless display for matplotlib SHAP plotting
          export MPLBACKEND=Agg
          python aqi_training_pipeline.py <<EOF
          n
          EOF
          # Send 'n' to stdin in case it prompts for Hopsworks upload when API key is not configured

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add aqi_model_*.pkl shap_summary_1d.png
          git diff-index --quiet HEAD || git commit -m "auto-update: retrain AQI forecasting models"
          git push
